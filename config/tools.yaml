# ============================================
# Tool Configurations
# ============================================

# ============================================
# ServiceNow Tool Configuration
# ============================================
servicenow:
  # API endpoints
  endpoints:
    incidents: "/api/now/table/incident"

  # For searching ServiceNow
  search:
    default_limit: 5
    default_order: ORDERBYDESCsys_updated_on

    # Fields used for OR-based text search
    searchable_fields:
      - short_description
      - description
      - close_notes

    # Default states by intent
    default_states:
      decision:
        - New
        - In Progress
      knowledge:
        - Resolved
        - Closed

  # Default ticket values
  defaults:
    category: "LLM-Assisted Resolution"
    impact: "3"
    urgency: "3"
    assignment_group: ""

  # Priority mapping (impact x urgency matrix)
  priority_mapping:
    critical:
      impact: "1"
      urgency: "1"
    high:
      impact: "2"
      urgency: "2"
    medium:
      impact: "2"
      urgency: "3"
    low:
      impact: "3"
      urgency: "3"

  # Request settings
  request:
    timeout_seconds: 30
    retry_attempts: 3
