# ============================================
# Global Settings Configuration
# ============================================

aws:
  region: "us-east-1"
  # Bedrock endpoint (optional, uses default if not specified)
  bedrock_endpoint: null

opensearch:
  # OpenSearch Serverless endpoint (without https://)
  host: null  # Set via environment variable OPENSEARCH_HOST or update here
  index_name: "sharepoint-docs"

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  # Enable JSON logging for production (easier to parse in CloudWatch)
  json_format: true

# Rate limiting and safety
rate_limits:
  max_agent_iterations: 20
  max_handoffs: 15
  execution_timeout_seconds: 900
  node_timeout_seconds: 300
